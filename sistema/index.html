<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistema Interactivo — Nuzic</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/grid.css">
<link rel="stylesheet" href="css/slides.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/tweaks.css">
</head>
<body data-theme="light">

  <main class="slide-stage" id="slide-stage" aria-live="polite"></main>

  <nav class="sistema-nav" aria-label="Navegación del sistema">
    <div class="sistema-nav__progress">
      <div class="sistema-nav__progress-track" id="progress-track"></div>
    </div>
    <div class="sistema-nav__bar">
      <button id="btn-prev" class="sistema-nav__btn" aria-label="Anterior">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="sistema-nav__title-wrap">
        <button class="sistema-nav__title" id="nav-title" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-controls="nav-sections-menu"
                aria-label="Saltar a un capítol">
          <span class="sistema-nav__section" id="nav-section">Sección</span>
          <span class="sistema-nav__sep">·</span>
          <span class="sistema-nav__step" id="nav-step">Paso</span>
        </button>
        <ul class="sistema-nav__sections-menu" id="nav-sections-menu" role="listbox" hidden></ul>
      </div>
      <button id="btn-next" class="sistema-nav__btn" aria-label="Siguiente">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </nav>

  <aside class="tweaks" id="tweaks" hidden>
    <div class="tweaks__head" id="tweaks-head">
      <span class="tweaks__grip" aria-hidden="true">⋮⋮</span>
      <span class="tweaks__title">Tweaks</span>
      <button class="tweaks__collapse" id="tweaks-collapse" type="button" aria-label="Colapsar panel" title="Colapsar">–</button>
    </div>
    <div class="tweaks__body">
      <label class="tweaks__row"><span>Ir a paso</span>
        <select id="tw-paso"></select>
      </label>
      <label class="tweaks__row"><span>Tema</span>
        <select id="tw-theme">
          <option value="light">Claro</option>
          <option value="dark">Oscuro</option>
        </select>
      </label>
      <label class="tweaks__row"><span>Densidad</span>
        <select id="tw-density">
          <option value="compact">Compacta</option>
          <option value="cozy">Normal</option>
          <option value="loose">Amplia</option>
        </select>
      </label>
      <label class="tweaks__row"><span>Cargar iframes</span>
        <input type="checkbox" id="tw-iframe">
      </label>
      <label class="tweaks__row"><span>Editar textos</span>
        <input type="checkbox" id="tw-edit">
      </label>
      <div class="tweaks__row tweaks__row--actions" id="tw-edit-actions" hidden>
        <button type="button" id="tw-hl-pink" class="tweaks__btn tweaks__btn--hl-pink" title="Resaltar la selección en rosa (soundline)">Marca rosa</button>
        <button type="button" id="tw-hl-yellow" class="tweaks__btn tweaks__btn--hl-yellow" title="Resaltar la selección en amarillo (timeline)">Marca groc</button>
        <button type="button" id="tw-hl-clear" class="tweaks__btn" title="Quitar el resaltado de la selección">Sin marca</button>
      </div>
      <div class="tweaks__row tweaks__row--actions" id="tw-edit-actions-2" hidden>
        <button type="button" id="tw-export" class="tweaks__btn">Exportar</button>
        <button type="button" id="tw-reset-paso" class="tweaks__btn">Restaurar paso</button>
      </div>
    </div>
    <div class="tweaks__foot">← / → para navegar</div>
  </aside>

<script type="module" src="js/slides.js"></script>
<script type="module" src="js/tweaks.js"></script>
</body>
</html>
