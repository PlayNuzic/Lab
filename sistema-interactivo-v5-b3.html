<script>
// Helper: convertir hex a RGB components
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}
// Helper: enfosquir un color hex un % (0-1)
function darkenHex(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  const dr = Math.round(r * (1 - amount));
  const dg = Math.round(g * (1 - amount));
  const db = Math.round(b * (1 - amount));
  return '#' + [dr,dg,db].map(v => v.toString(16).padStart(2,'0')).join('');
}
// Helper: aclarir un color hex un % (0-1)
function lightenHex(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  const lr = Math.round(r + (255 - r) * amount);
  const lg = Math.round(g + (255 - g) * amount);
  const lb = Math.round(b + (255 - b) * amount);
  return '#' + [lr,lg,lb].map(v => v.toString(16).padStart(2,'0')).join('');
}

function generateCSS(config) {
  const c = config.colors;
  const t = config.typography;
  const l = config.layout;
  // Colors derivats per hovers (calculats automàticament)
  const accentHover = darkenHex(c.accent, 0.18);    // botó next hover
  const creamHover = darkenHex(c.cream, 0.08);       // botó prev hover
  const iframeBg = darkenHex(c.lightBg, 0.03);       // fons iframe
  const rgb = hexToRgb;                               // shortcut

  return `
/* ====== RESET & BASE ====== */

#nuz-sistema {
  font-family: '${t.bodyFont}', 'Bariol', Arial, sans-serif;
  color: ${c.text};
  /* Break out d'Elementor column, limitat a 1340px */
  width: 100vw;
  max-width: 1340px;
  position: relative;
  left: 50%;
  transform: translateX(-50%);
  overflow-x: hidden;
}

/* ====== TIPOGRAFIES NUZIC ====== */
#nuz-sistema h2.nuz-title {
  font-family: '${t.titleFont}', sans-serif;
  font-weight: ${t.titleWeight};
  font-size: ${t.titleSize}px;
  color: ${c.text};
  margin-bottom: 20px;
  line-height: 1.3;
}
#nuz-sistema h4.nuz-cta {
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.bodyWeight};
  font-size: ${t.bodySize}px;
  color: ${c.accent};
  margin: 24px 0 15px;
  letter-spacing: 0.5px;
  text-align: center;
}
/* CTA clicable: cursor i hover */
/* Forçar cursor pointer amb !important contra Elementor */
#nuz-sistema h4.nuz-cta.nuz-cta-clickable,
#nuz-sistema [data-action="scroll-to-app"] {
  cursor: pointer !important;
  transition: opacity 0.2s;
  user-select: none;
}
#nuz-sistema h4.nuz-cta.nuz-cta-clickable:hover,
#nuz-sistema [data-action="scroll-to-app"]:hover {
  opacity: 0.7;
}
#nuz-sistema .nuz-theory {
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.bodyWeight};
  font-size: ${t.bodySize}px;
  line-height: 1.7;
  color: ${c.text};
}
#nuz-sistema .nuz-app-info {
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.bodyWeight};
  font-size: ${t.infSmallSize}px;
  line-height: 1.6;
  color: ${c.text};
  background: ${c.lightBg};
  border-radius: ${l.borderRadius}px;
  padding: 20px 24px;
  margin-bottom: 12px;
}
#nuz-sistema .nuz-app-info strong {
  font-weight: ${t.buttonWeight};
  color: ${c.primary};
}
#nuz-sistema .nuz-app-info p {
  margin-bottom: 8px;
}
#nuz-sistema .nuz-app-info p:last-child {
  margin-bottom: 0;
}

/* ====== MINI-INDEX PERSISTENT ====== */
#nuz-miniindex {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  padding: 10px 16px;
  background: rgba(${rgb(c.cream).r},${rgb(c.cream).g},${rgb(c.cream).b},0.85);
  border-radius: 0 0 ${l.borderRadius}px ${l.borderRadius}px;
  margin-bottom: 20px;
  justify-content: center;
  font-size: 13px;
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.navWeight};
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
#nuz-miniindex a {
  color: ${c.text} !important;
  text-decoration: none !important;
  padding: 3px 8px;
  border-radius: 4px;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
#nuz-miniindex a:hover,
#nuz-miniindex a.nuz-active-section {
  background: ${c.accent} !important;
  color: #fff !important;
}
#nuz-miniindex .nuz-step-num {
  font-size: 11px;
  opacity: 0.6;
  margin-left: 8px;
}

/* ====== PROGRESS BAR ====== */
#nuz-progress-wrap {
  height: 6px;
  background: ${c.cream};
  border-radius: 3px;
  margin-bottom: 16px;
  transition: height 0.15s ease;
  cursor: pointer;
  position: relative;
}
#nuz-progress-wrap:hover {
  height: 10px;
}
#nuz-progress-wrap::after {
  content: '';
  position: absolute;
  top: -8px;
  left: 0;
  right: 0;
  bottom: -8px;
}
#nuz-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, ${c.teal}, ${c.accent});
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}
#nuz-progress-tooltip {
  display: none;
  position: absolute;
  top: -30px;
  transform: translateX(-50%);
  background: ${c.text};
  color: #fff;
  font-family: '${t.bodyFont}', sans-serif;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 110;
}

/* ====== MINI-INDEX BOTTOM ====== */
.nuz-miniindex-bottom {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  padding: 10px 16px;
  background: rgba(${rgb(c.cream).r},${rgb(c.cream).g},${rgb(c.cream).b},0.85);
  border-radius: ${l.borderRadius}px ${l.borderRadius}px 0 0;
  margin-top: 20px;
  justify-content: center;
  font-size: 13px;
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.navWeight};
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.nuz-miniindex-bottom a {
  color: ${c.text} !important;
  text-decoration: none !important;
  padding: 3px 8px;
  border-radius: 4px;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
.nuz-miniindex-bottom a:hover,
.nuz-miniindex-bottom a.nuz-active-section {
  background: ${c.accent} !important;
  color: #fff !important;
}
.nuz-miniindex-bottom .nuz-step-num {
  font-size: 11px;
  opacity: 0.6;
  margin-left: 8px;
}

/* ====== PASSOS: SHOW/HIDE ====== */
.nuz-paso {
  display: none;
  padding: 0;
  flex-direction: column;
}
.nuz-paso.nuz-visible {
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 60px);
}

/* ====== SCROLL CONTAINER (Theory + App) ====== */
.nuz-scroll-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-snap-type: none;
  scroll-behavior: smooth;
  padding: 0;
}
.nuz-scroll-container.nuz-snap-active {
  scroll-snap-type: y mandatory;
}

/* ====== SNAP SECTIONS ====== */
.nuz-snap-section {
  min-height: calc(100vh - 130px);
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px 20px;
  flex-shrink: 0;
}
.nuz-snap-section.nuz-app-section {
  justify-content: flex-start;
  padding: 20px 0;
  align-items: center;
  min-height: auto;
}
/* Fullwidth iframes: stretch to fill container */
.nuz-snap-section.nuz-app-section .nuz-iframe-fullwidth {
  align-self: stretch;
}
.nuz-paso:not(.nuz-has-app) .nuz-snap-section {
  min-height: auto;
  padding: 20px 20px 10px;
}

/* ====== NAVIGATION ROW (Always visible, centrat) ====== */
.nuz-paso > .nuz-nav-row {
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 12px 0;
  z-index: 50;
  border-top: 1px solid rgba(${rgb(c.text).r},${rgb(c.text).g},${rgb(c.text).b},0.06);
  max-width: ${l.maxWidth}px;
  width: 100%;
  align-self: center;
}

/* ====== IDEA BLOCKS (Hover zoom) ====== */
.nuz-idea-block {
  background: ${c.cardBg};
  border: 1px solid rgba(${rgb(c.text).r},${rgb(c.text).g},${rgb(c.text).b},0.08);
  border-radius: ${l.borderRadius}px;
  padding: 22px 26px;
  margin-bottom: 32px;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  cursor: default;
}
.nuz-idea-block p + p {
  margin-top: 14px;
}
.nuz-idea-block:hover {
  transform: scale(${l.zoomScale});
  box-shadow: 0 4px 16px rgba(${rgb(c.text).r},${rgb(c.text).g},${rgb(c.text).b},0.10);
  border-color: rgba(${rgb(c.accent).r},${rgb(c.accent).g},${rgb(c.accent).b},0.3);
}

/* ====== IFRAMES ====== */
.nuz-iframe-wrap {
  width: 100%;
  border-radius: ${l.borderRadius}px;
  overflow: hidden;
  margin: 12px 0 20px;
  background: ${iframeBg};
  flex: 1;
  min-height: 0;
}
.nuz-iframe-wrap iframe {
  width: 100%;
  border: none;
  display: block;
}
.nuz-iframe-fullwidth {
  width: 100%;
  max-width: none;
  border-radius: 0;
}
.nuz-iframe-tall iframe {
  height: calc(100vh - 200px) !important;
  min-height: 500px;
}

/* ====== NAVIGATION BUTTONS ====== */
.nuz-nav-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 48px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.nuz-btn {
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.buttonWeight};
  font-size: 17px;
  padding: 14px 38px;
  border-radius: 30px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  text-decoration: none;
  display: inline-block;
  letter-spacing: 0.3px;
}
.nuz-btn:active { transform: scale(0.97); }
.nuz-btn-next {
  background: ${c.accent};
  color: #fff;
  box-shadow: 0 3px 12px rgba(${rgb(c.accent).r},${rgb(c.accent).g},${rgb(c.accent).b},0.35);
}
.nuz-btn-next:hover {
  background: ${accentHover};
  box-shadow: 0 4px 16px rgba(${rgb(c.accent).r},${rgb(c.accent).g},${rgb(c.accent).b},0.5);
}
.nuz-btn-prev {
  background: ${c.cream};
  color: ${c.text};
  border-color: rgba(${rgb(c.text).r},${rgb(c.text).g},${rgb(c.text).b},0.12);
}
.nuz-btn-prev:hover { background: ${creamHover}; }

/* ====== SCROLL INDICATOR (Chevron) ====== */
.nuz-scroll-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 0 8px;
  opacity: 0.5;
  transition: opacity 0.3s;
  cursor: pointer;
}
.nuz-scroll-indicator:hover { opacity: 0.9; }
.nuz-scroll-indicator span {
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.navWeight};
  font-size: 13px;
  color: ${c.accent};
  letter-spacing: 0.5px;
}
.nuz-scroll-chevron {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  animation: nuzBounce 1.8s ease-in-out infinite;
}
@keyframes nuzBounce {
  0%, 100% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(5px); opacity: 1; }
}

/* ====== TOGGLE (Step 21) ====== */
.nuz-toggle-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: '${t.bodyFont}', sans-serif;
  font-weight: ${t.navWeight};
  font-size: 13px;
  color: ${c.accent};
  cursor: pointer;
  padding: 14px 0 8px;
  opacity: 0.55;
  transition: opacity 0.3s;
  user-select: none;
  letter-spacing: 0.5px;
}
.nuz-toggle-header:hover { opacity: 0.9; }
.nuz-toggle-header .nuz-toggle-chevron {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  transition: transform 0.3s;
}
.nuz-toggle-header.nuz-open .nuz-toggle-chevron {
  transform: rotate(180deg);
}
.nuz-toggle-body { display: none; padding: 16px 0; }
.nuz-toggle-body.nuz-open { display: block; }

/* ====== LAYOUT CENTERING ====== */
/* Tots els fills directes de snap-section: centrats amb max-width */
.nuz-snap-section > h2,
.nuz-snap-section > .nuz-spacer,
.nuz-snap-section > h4,
.nuz-snap-section > .nuz-app-info,
.nuz-snap-section > .nuz-scroll-indicator,
.nuz-snap-section.nuz-app-section > h4 {
  max-width: ${l.maxWidth}px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  padding-left: 20px;
  padding-right: 20px;
}
/* Idea blocks: NO width:100%, max-width reduït pel zoom, centrat amb margin auto */
.nuz-snap-section > .nuz-idea-block {
  max-width: calc(${l.maxWidth}px - 140px);
  padding-left: 28px;
  padding-right: 28px;
  box-sizing: border-box;
}
.nuz-paso > .nuz-nav-row {
  max-width: ${l.maxWidth}px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
}
#nuz-miniindex {
  max-width: ${l.maxWidth}px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
}
#nuz-progress-wrap {
  max-width: ${l.maxWidth}px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
}
.nuz-iframe-wrap:not(.nuz-iframe-fullwidth) {
  max-width: ${l.maxWidth}px;
  margin-left: auto;
  margin-right: auto;
}

/* ====== SPACER ====== */
.nuz-spacer {
  height: ${l.spacerHeight}px;
  flex-shrink: 0;
}

/* ====== RESPONSIVE ====== */
@media (max-width: 768px) {
  #nuz-sistema { padding: 0 8px; }
  #nuz-sistema h2.nuz-title { font-size: 22px; }
  #nuz-sistema .nuz-theory { font-size: 16px; }
  #nuz-miniindex { font-size: 12px; gap: 4px 8px; padding: 8px 10px; }
  .nuz-idea-block { padding: 14px 16px; margin-bottom: 24px; margin-left: 8px; margin-right: 8px; }
  .nuz-idea-block:hover { transform: none; }
  .nuz-iframe-wrap iframe { height: 500px !important; }
  .nuz-iframe-tall iframe { height: calc(100vh - 160px) !important; }
  .nuz-btn { font-size: 15px; padding: 12px 28px; }
  .nuz-snap-section { padding: 20px 0; }
  .nuz-scroll-indicator span { font-size: 11px; }
  .nuz-scroll-chevron { width: 18px; height: 18px; }
  .nuz-scroll-indicator { gap: 6px; }
}
  `;
}
</script>

<!-- ============================================================================
     ZONA 4: HTML TEMPLATE ENGINE (Generador d'HTML per a cada pas)
     ============================================================================ -->
<script>
function generateSteps(steps, config) {
  const sections = config.navigation.sections;

  return steps.map((step, idx) => {
    const nextIdx = idx + 1 < steps.length ? idx + 1 : -1;
    const prevIdx = idx > 0 ? idx - 1 : -1;

    // Generate idea blocks HTML
    let blocksHTML = '';
    if (step.blocks && step.blocks.length > 0) {
      step.blocks.forEach((blockParagraphs, bIdx) => {
        blocksHTML += '<div class="nuz-idea-block nuz-theory">';
        blockParagraphs.forEach(p => {
          blocksHTML += `<p>${p}</p>`;
        });
        blocksHTML += '</div>';
        if (bIdx < step.blocks.length - 1) {
          blocksHTML += '<div class="nuz-spacer"></div>';
        }
      });
    }

    // Generate appInfo HTML
    let appInfoHTML = '';
    if (step.appInfo && step.appInfo.length > 0) {
      appInfoHTML += '<div class="nuz-app-info">';
      step.appInfo.forEach(info => {
        appInfoHTML += `<p>${info}</p>`;
      });
      appInfoHTML += '</div>';
    }

    // Generate navigation buttons
    let navHTML = '<div class="nuz-nav-row">';
    if (prevIdx >= 0) {
      navHTML += `<button class="nuz-btn nuz-btn-prev" onclick="nuzGo(${prevIdx})">&larr; Anterior</button>`;
    }
    if (nextIdx >= 0) {
      navHTML += `<button class="nuz-btn nuz-btn-next" onclick="nuzGo(${nextIdx})">Siguiente paso &rarr;</button>`;
    }
    navHTML += '</div>';

    let stepHTML = `<div class="nuz-paso${step.type === 'app' || step.type === 'special' ? ' nuz-has-app' : ''}" data-step="${idx}">`;

    // Acció compartida: activar snap + carregar iframes + scroll a app
    const scrollAction = "var sc=this.closest('.nuz-scroll-container');sc.classList.add('nuz-snap-active');if(sc._loadIframes)sc._loadIframes();sc.querySelector('.nuz-app-section').scrollIntoView({behavior:'smooth'})";
    const chevronSvg = '<svg class="nuz-scroll-chevron" viewBox="0 0 24 24" fill="none" stroke="' + config.colors.accent + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

    if (step.type === 'text') {
      // Text-only step
      stepHTML += '<div class="nuz-snap-section">';
      stepHTML += `<h2 class="nuz-title">${step.title}</h2>`;
      stepHTML += blocksHTML;
      stepHTML += navHTML;
      stepHTML += '</div></div>';
    } else if (step.type === 'app') {
      // App step with scroll container
      stepHTML += '<div class="nuz-scroll-container">';
      stepHTML += '<div class="nuz-snap-section">';
      stepHTML += `<h2 class="nuz-title">${step.title}</h2>`;
      stepHTML += blocksHTML;
      if (appInfoHTML) {
        stepHTML += '<div class="nuz-spacer"></div>';
        stepHTML += '<h4 class="nuz-cta nuz-cta-clickable" style="margin-top:0;" data-action="scroll-to-app">Ejemplo interactivo</h4>';
        stepHTML += appInfoHTML;
        stepHTML += '<div class="nuz-scroll-indicator" data-action="scroll-to-app">';
        stepHTML += chevronSvg;
        stepHTML += '<span>Desliza para probar la app</span></div>';
      }
      stepHTML += '</div>';
      stepHTML += '<div class="nuz-snap-section nuz-app-section">';
      const iwClass = step.fullwidth ? 'nuz-iframe-fullwidth' : '';
      const iTall = step.tall ? 'nuz-iframe-tall' : '';
      stepHTML += `<div class="nuz-iframe-wrap ${iwClass} ${iTall}"><iframe data-src="${step.appUrl}" height="${step.appHeight}" loading="lazy" allow="autoplay"></iframe></div>`;
      stepHTML += '</div></div>';
      stepHTML += navHTML;
      stepHTML += '</div>';
    } else if (step.type === 'special') {
      // Special step with toggle (Step 21)
      stepHTML += '<div class="nuz-scroll-container">';
      stepHTML += '<div class="nuz-snap-section">';
      stepHTML += `<h2 class="nuz-title">${step.title}</h2>`;
      if (appInfoHTML) {
        stepHTML += '<div class="nuz-spacer"></div>';
        stepHTML += '<h4 class="nuz-cta nuz-cta-clickable" style="margin-top:0;" data-action="scroll-to-app">Ejemplo interactivo</h4>';
        stepHTML += appInfoHTML;
        stepHTML += '<div class="nuz-scroll-indicator" data-action="scroll-to-app">';
        stepHTML += chevronSvg;
        stepHTML += '<span>Desliza para probar la app</span></div>';
      }
      stepHTML += '</div>';
      stepHTML += '<div class="nuz-snap-section nuz-app-section">';
      const iwClass = step.fullwidth ? 'nuz-iframe-fullwidth' : '';
      const iTall = step.tall ? 'nuz-iframe-tall' : '';
      stepHTML += `<div class="nuz-iframe-wrap ${iwClass} ${iTall}"><iframe data-src="${step.appUrl}" height="${step.appHeight}" loading="lazy" allow="autoplay"></iframe></div>`;

      // Toggle section
      if (step.hasToggle) {
        stepHTML += '<div class="nuz-toggle-header">';
        stepHTML += '<svg class="nuz-toggle-chevron" viewBox="0 0 24 24" fill="none" stroke="' + config.colors.accent + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';
        stepHTML += `<span>${step.toggleLabel}</span></div>`;
        stepHTML += '<div class="nuz-toggle-body">';
        stepHTML += `<h4 class="nuz-cta">${step.toggleLabel}</h4>`;
        const iTallToggle = step.tall ? 'nuz-iframe-tall' : '';
        stepHTML += `<div class="nuz-iframe-wrap ${iwClass} ${iTallToggle}"><iframe data-src="${step.toggleAppUrl}" height="${step.toggleAppHeight}" loading="lazy" allow="autoplay"></iframe></div>`;
        stepHTML += '</div>';
      }

      stepHTML += '</div></div>';
      stepHTML += navHTML;
      stepHTML += '</div>';
    }

    return stepHTML;
  }).join('');
}
</script>

<!-- ============================================================================
     ZONA 5: NAVIGATION ENGINE (nuzGo logic + Event listeners)
     ============================================================================ -->
<script>
(function() {
  // Generate and inject CSS
  const styleTag = document.createElement('style');
  styleTag.textContent = generateCSS(NUZ_CONFIG);
  document.head.appendChild(styleTag);

  // Generar i injectar HTML dins el placeholder
  var root = document.getElementById('nuz-root');
  root.innerHTML = `
    <div id="nuz-sistema">

    <!-- Mini-index superior (sticky) -->
    <nav id="nuz-miniindex">
      ${NUZ_CONFIG.navigation.sections.map((sec, i) =>
        `<a href="#" onclick="nuzGo(${sec.start});return false;">${sec.name}</a>`
      ).join('')}
      <span class="nuz-step-num" id="nuz-step-indicator">1/${NUZ_STEPS.length}</span>
    </nav>

    <!-- Barra de progrés clicable -->
    <div id="nuz-progress-wrap"><div id="nuz-progress-bar"></div><div id="nuz-progress-tooltip"></div></div>

    <!-- Contingut dels passos (generat per la ZONA 4) -->
    ${generateSteps(NUZ_STEPS, NUZ_CONFIG)}

    <!-- Mini-index inferior (duplicat) -->
    <nav class="nuz-miniindex-bottom" id="nuz-miniindex-bottom">
      ${NUZ_CONFIG.navigation.sections.map((sec, i) =>
        `<a href="#" onclick="nuzGo(${sec.start});return false;">${sec.name}</a>`
      ).join('')}
      <span class="nuz-step-num" id="nuz-step-indicator-bottom">1/${NUZ_STEPS.length}</span>
    </nav>

    </div>
  `;

  // Now setup the navigation logic
  var current = 0;
  var pasos = document.querySelectorAll('#nuz-sistema .nuz-paso');
  var total = pasos.length;
  var indicator = document.getElementById('nuz-step-indicator');
  var progressBar = document.getElementById('nuz-progress-bar');
  var progressWrap = document.getElementById('nuz-progress-wrap');
  var progressTooltip = document.getElementById('nuz-progress-tooltip');

  var indicatorBottom = document.getElementById('nuz-step-indicator-bottom');
  var sectionStarts = NUZ_CONFIG.navigation.sections.map(s => s.start);
  var menuLinks = document.querySelectorAll('#nuz-miniindex a');
  var menuLinksBottom = document.querySelectorAll('#nuz-miniindex-bottom a');

  var stepTitles = [];
  pasos.forEach(function(p) {
    var h2 = p.querySelector('h2.nuz-title');
    stepTitles.push(h2 ? h2.textContent : 'Paso ' + (stepTitles.length+1));
  });

  window.nuzGo = function(n) {
    if (n < 0 || n >= total) return;
    pasos[current].classList.remove('nuz-visible');
    var oldIframes = pasos[current].querySelectorAll('iframe[src]');
    oldIframes.forEach(function(f) { f.removeAttribute('src'); });

    current = n;
    pasos[current].classList.add('nuz-visible');
    var sc = pasos[current].querySelector('.nuz-scroll-container');
    if (sc) {
      sc.classList.remove('nuz-snap-active');
      sc.scrollTop = 0;
      var _iframesLoaded = false;
      var _loadIframes = function() {
        if (_iframesLoaded) return;
        _iframesLoaded = true;
        var iframes = pasos[current].querySelectorAll('iframe[data-src]');
        iframes.forEach(function(f) {
          if (!f.src || f.src === 'about:blank' || !f.hasAttribute('src')) {
            f.src = f.getAttribute('data-src');
            f.addEventListener('load', function() {
              try { f.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
              /* Fix2: re-scroll a l'app-section després de carregar iframe */
              if (sc.classList.contains('nuz-snap-active')) {
                var as = sc.querySelector('.nuz-app-section');
                if (as) setTimeout(function() { as.scrollIntoView({behavior:'smooth'}); }, 100);
              }
            }, { once: true });
          }
        });
      };
      sc._loadIframes = _loadIframes;

      /* Carreguem iframes IMMEDIATAMENT (mentre l'usuari llegeix la teoria).
         Guarda anti-caret: qualsevol scroll causat pel focus intern de l'iframe
         es reseteja a 0 fins que l'usuari interactua explícitament. */
      var _snapActivated = false;
      sc._guardActive = true;
      var _scrollGuard = function() {
        if (sc._guardActive && !_snapActivated) {
          sc.scrollTop = 0;
        }
      };
      sc.addEventListener('scroll', _scrollGuard, { passive: true });

      var activateSnap = function() {
        if (_snapActivated) return;
        _snapActivated = true;
        sc._guardActive = false;
        sc.removeEventListener('scroll', _scrollGuard);
        sc.classList.add('nuz-snap-active');
      };
      setTimeout(function() {
        sc.addEventListener('scroll', activateSnap, { once: true, passive: true });
        sc.addEventListener('touchmove', activateSnap, { once: true, passive: true });
        sc.addEventListener('wheel', activateSnap, { once: true, passive: true });
        /* Carregar iframes amb 1.5s delay per deixar que el DOM es renderitzi */
        setTimeout(function() { _loadIframes(); }, 1500);
      }, 300);
    }
    if (!pasos[current].querySelector('.nuz-scroll-container')) {
      var newIframes = pasos[current].querySelectorAll('iframe[data-src]');
      newIframes.forEach(function(f) {
        if (!f.src || f.src === '') f.src = f.getAttribute('data-src');
      });
    }

    var label = (current+1) + '/' + total;
    indicator.textContent = label;
    if (indicatorBottom) indicatorBottom.textContent = label;
    progressBar.style.width = ((current+1)/total*100) + '%';
    var activeSection = 0;
    for (var i = sectionStarts.length-1; i >= 0; i--) {
      if (current >= sectionStarts[i]) { activeSection = i; break; }
    }
    menuLinks.forEach(function(a,i) {
      a.classList.toggle('nuz-active-section', i === activeSection);
    });
    menuLinksBottom.forEach(function(a,i) {
      a.classList.toggle('nuz-active-section', i === activeSection);
    });
    var sistema = document.getElementById('nuz-sistema');
    if (sistema) sistema.scrollIntoView({ behavior: 'smooth', block: 'start' });
    history.replaceState(null, '', '?paso=' + (current+1));
  };

  // ====== EVENT DELEGATION: data-action="scroll-to-app" ======
  // Gestiona clicks en h4 "Ejemplo interactivo" i scroll-indicator.
  // Usem event delegation perquè és robust contra sanitització d'Elementor.
  document.getElementById('nuz-sistema').addEventListener('click', function(e) {
    var target = e.target.closest('[data-action="scroll-to-app"]');
    if (!target) return;
    var sc = target.closest('.nuz-scroll-container');
    if (!sc) return;
    /* Desactivar guarda anti-caret i activar snap */
    sc._guardActive = false;
    sc.classList.add('nuz-snap-active');
    if (sc._loadIframes) sc._loadIframes();
    var appSection = sc.querySelector('.nuz-app-section');
    if (appSection) appSection.scrollIntoView({ behavior: 'smooth' });
  });

  // ====== EVENT DELEGATION: toggle header ======
  document.getElementById('nuz-sistema').addEventListener('click', function(e) {
    var target = e.target.closest('.nuz-toggle-header');
    if (!target) return;
    target.classList.toggle('nuz-open');
    var tb = target.nextElementSibling;
    if (tb) {
      tb.classList.toggle('nuz-open');
      tb.querySelectorAll('iframe[data-src]').forEach(function(f) {
        if (!f.src || f.src === 'about:blank') f.src = f.getAttribute('data-src');
      });
    }
  });

  // Progress bar click
  function getStepFromClick(e) {
    var rect = progressWrap.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var pct = Math.max(0, Math.min(1, x / rect.width));
    return Math.min(Math.floor(pct * total), total - 1);
  }
  progressWrap.addEventListener('click', function(e) {
    nuzGo(getStepFromClick(e));
  });
  progressWrap.addEventListener('mousemove', function(e) {
    var step = getStepFromClick(e);
    var rect = progressWrap.getBoundingClientRect();
    var x = e.clientX - rect.left;
    progressTooltip.style.display = 'block';
    progressTooltip.style.left = x + 'px';
    progressTooltip.textContent = stepTitles[step] || ('Paso ' + (step+1));
  });
  progressWrap.addEventListener('mouseleave', function() {
    progressTooltip.style.display = 'none';
  });

  // Initialize
  var urlParams = new URLSearchParams(window.location.search);
  var startStep = parseInt(urlParams.get('paso')) || 1;
  nuzGo(Math.max(0, Math.min(startStep-1, total-1)));

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nuzGo(current+1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); nuzGo(current-1); }
  });
})();
</script>
