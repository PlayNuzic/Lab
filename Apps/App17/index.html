<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo Temporal - Círculo</title>
  <script src="../../libs/app-common/embed-mode.js"></script>
  <link rel="stylesheet" href="../../libs/shared-ui/index.css" />
  <link rel="stylesheet" href="../../libs/app-common/styles.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/bpm-inline.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/nuzic-theme.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../../libs/app-common/embed.css" />
  <link rel="icon" href="../../favicon.ico" />
</head>
<body class="app17" data-theme="system" data-visual="nuzic">
  <div id="app-root"></div>

  <script type="module">
    import { initHeader } from '../../libs/shared-ui/header.js';
    import { renderApp } from '../../libs/app-common/template.js';

    renderApp({
      root: document.getElementById('app-root'),
      title: 'Módulo Temporal - Círculo',
      showSelectColor: true,
      showHoverToggle: false,
      showAccent: false,
      showComplexFractions: false,
      pulseSequence: false,
      showPulseToggle: false,
      showP1Toggle: true,
      showCircularTimelineToggle: false,
      showCycleHighlightToggle: true,
      hideT: true,
      hideLeds: true,
      randomMenuContent: `
        <label>
          <span>Pulsos máximo</span>
          <input type="number" id="randPulsosMax" value="12" min="1" max="99">
        </label>
        <label>
          <span>Cycles máximo</span>
          <input type="number" id="randCyclesMax" value="8" min="1" max="12">
        </label>
      `
    });

    // Reemplazar inputs Lg/V por nuestro control BPM + Compás (amb cycle niat)
    const inputsSection = document.querySelector('.inputs');
    if (inputsSection) {
      inputsSection.innerHTML = `
        <div class="bpm-inline visible" id="bpmParam">
          <span class="abbr">BPM</span>
          <div class="circle">
            <input id="inputBpm" type="number" min="50" max="150" value="90" />
            <div class="spinner">
              <button id="bpmUp" class="spin up" type="button" aria-label="Incrementar BPM"></button>
              <button id="bpmDown" class="spin down" type="button" aria-label="Decrementar BPM"></button>
            </div>
          </div>
        </div>
        <div class="param param--large param--large--dual compas" id="compasParam">
          <span class="abbr">Pulsos por Compás:</span>
          <div class="circle">
            <div class="pl-primary">
              <input id="inputCompas" type="number" min="1" max="12" value="" />
            </div>
            <div class="pl-secondary cycle-circle">
              <input id="inputCycle" type="number" min="1" max="12" value="" />
              <div class="cycle-counter__digit" id="cycleDigit"></div>
              <span class="abbr abbr--secondary">Nº de compases</span>
            </div>
            <div class="spinner">
              <button id="compasUp" class="spin up" type="button" aria-label="Incrementar Compás">+</button>
              <button id="compasDown" class="spin down" type="button" aria-label="Decrementar Compás">−</button>
            </div>
          </div>
        </div>
      `;
    }

    // Ocultar la sección middle (fórmula)
    const middleSection = document.querySelector('.middle');
    if (middleSection) middleSection.style.display = 'none';

    initHeader();
    import('./main.js');
  </script>

  <!-- Rendimiento Audio (menú flotante) -->
  <script type="module" src="../../libs/shared-ui/performance-audio-menu.js"></script>
  <!-- Long-press para abrir el mixer -->
  <script type="module" src="../../libs/app-common/mixer-longpress.js"></script>
</body>
</html>
