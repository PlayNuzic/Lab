<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Línea Temporal</title>
  <script src="../../libs/app-common/embed-mode.js"></script>
  <link rel="stylesheet" href="../../libs/shared-ui/index.css" />
  <link rel="stylesheet" href="../../libs/app-common/styles.css" />
  <link rel="stylesheet" href="../../libs/app-common/timeline-intervals.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/bpm-inline.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/nuzic-theme.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../../libs/app-common/embed.css" />
  <link rel="icon" href="../../favicon.ico" />
  <link rel="modulepreload" href="./main.js" />
</head>
<body data-theme="light" data-visual="nuzic">
  <div id="app-root"></div>
  <!-- Tone.js is now loaded lazily after user interaction via tone-loader.js -->
  <script type="module">
    import { initHeader } from '../../libs/shared-ui/header.js';
    import { renderApp } from '../../libs/app-common/template.js';

    // Set defaults in localStorage BEFORE header initializes
    const app9Prefs = localStorage.getItem('app9-preferences');
    if (!app9Prefs) {
      // First time - set factory defaults
      localStorage.setItem('app9-preferences', JSON.stringify({
        baseSound: 'click1',
        accentSound: 'click2'
      }));
    } else {
      // Migrate removed sounds (click11→click13 era la migració antiga;
      // click12/click13 es van eliminar el 2026-06) cap a Click Acento
      const prefs = JSON.parse(app9Prefs);
      if (['click11', 'click12', 'click13'].includes(prefs.accentSound)) {
        prefs.accentSound = 'click2';
        localStorage.setItem('app9-preferences', JSON.stringify(prefs));
      }
    }

    renderApp({
      root: document.getElementById('app-root'),
      title: 'Línea Temporal',
      showSelectColor: false,
      showAccent: true,
      showComplexFractions: false,
      hideT: true,
      hideLeds: true,
      showCircularTimelineToggle: false,
      showHoverToggle: false,
      showStartSoundDropdown: false,
      showInstrumentDropdown: true,
      randomMenuContent: ''
    });
    initHeader();

    // Remove template-generated elements not needed
    document.querySelector('.middle')?.remove();

    // Replace .inputs content with BPM inline control
    const inputsSection = document.querySelector('.inputs');
    if (inputsSection) {
      inputsSection.innerHTML = `
        <div class="bpm-inline visible" id="bpmParam">
          <span class="abbr">BPM</span>
          <div class="circle">
            <input id="inputBpm" type="number" min="50" max="150" value="90" />
            <div class="spinner">
              <button id="bpmUp" class="spin up" type="button" aria-label="Incrementar BPM"></button>
              <button id="bpmDown" class="spin down" type="button" aria-label="Decrementar BPM"></button>
            </div>
          </div>
        </div>
      `;
    }

    import('./main.js');
  </script>

  <!-- Rendimiento Audio (menú flotante) -->
  <script type="module" src="../../libs/shared-ui/performance-audio-menu.js"></script>
</body>
</html>
