<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melodías con iSº</title>
  <script src="../../libs/app-common/embed-mode.js"></script>
  <link rel="stylesheet" href="../../libs/shared-ui/index.css" />
  <link rel="stylesheet" href="../../libs/app-common/styles.css" />
  <link rel="stylesheet" href="../../libs/musical-grid/musical-grid.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/app-viewport.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/bpm-inline.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/output-note-pill.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/scale-pill.css" />
  <link rel="stylesheet" href="../../libs/shared-ui/nuzic-theme.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../../libs/app-common/embed.css" />
  <link rel="icon" href="../../favicon.ico" />
</head>
<body class="app25b" data-theme="system" data-visual="nuzic">
  <div id="app-root"></div>
  <script type="module">
    import { initHeader } from '../../libs/shared-ui/header.js';
    import { renderApp } from '../../libs/app-common/template.js';

    // Set defaults in localStorage BEFORE header initializes
    const app25bPrefs = localStorage.getItem('app25b::preferences');
    if (!app25bPrefs) {
      localStorage.setItem('app25b::preferences', JSON.stringify({
        selectedInstrument: 'piano',
        selectColor: '#FFBB33'
      }));
    }

    renderApp({
      root: document.getElementById('app-root'),
      title: 'Melodías con iSº',
      showSelectColor: true,
      showAccent: false,
      showComplexFractions: false,
      hideT: true,
      hideLeds: true,
      showCircularTimelineToggle: false,
      showHoverToggle: false,
      showIntervalLinesToggle: false,
      showStartSoundDropdown: true,
      showInstrumentDropdown: true,
      showP1Toggle: true,
      showPulseToggle: false,
      showPolyphonyToggle: false,
      randomMenuContent: `
        <label>
          <span>Densidad (0-12)</span>
          <input type="number" id="randDensity" value="8" min="1" max="12">
        </label>
      `
    });

    // Load selection color BEFORE header initializes
    const app25bPrefsJson = localStorage.getItem('app25b::preferences');
    const app25bPrefsObj = app25bPrefsJson ? JSON.parse(app25bPrefsJson) : {};
    const storedColor = app25bPrefsObj.selectColor || '#FFBB33';
    document.documentElement.style.setProperty('--select-color', storedColor);
    document.documentElement.style.setProperty('--selection-color', storedColor);

    initHeader();

    // After header is initialized, sync color picker value
    const selectColor = document.getElementById('selectColor');
    if (selectColor) {
      selectColor.value = storedColor;
    }

    // Remove .middle, replace .inputs with scale + BPM params (nuzic pastillas)
    document.querySelector('.middle')?.remove();

    const inputsSection = document.querySelector('.inputs');
    if (inputsSection) {
      inputsSection.innerHTML = `
        <div class="bpm-inline visible param escala" id="escalaParam">
          <span class="abbr">Escala</span>
          <div class="circle escala-circle">
            <select id="escalaSelect" class="escala-select"></select>
          </div>
        </div>
        <div class="bpm-inline visible param outputnote" id="outputNoteParam">
          <span class="abbr">Transposición</span>
          <div class="circle">
            <input id="inputOutputNote" type="number" min="0" max="11" value="0" />
            <div class="spinner">
              <button id="outputNoteUp" class="spin up" type="button" aria-label="Incrementar transposición"></button>
              <button id="outputNoteDown" class="spin down" type="button" aria-label="Decrementar transposición"></button>
            </div>
          </div>
        </div>
        <div class="bpm-inline visible" id="bpmParam">
          <span class="abbr">BPM</span>
          <div class="circle">
            <input id="inputBpm" type="number" min="50" max="150" value="90" />
            <div class="spinner">
              <button id="bpmUp" class="spin up" type="button" aria-label="Incrementar BPM"></button>
              <button id="bpmDown" class="spin down" type="button" aria-label="Decrementar BPM"></button>
            </div>
          </div>
        </div>
      `;
    }

    import('./main.js');
  </script>

  <!-- Rendimiento Audio (menu flotante) -->
  <script type="module" src="../../libs/shared-ui/performance-audio-menu.js"></script>
  <!-- Long-press para abrir el mixer -->
  <script type="module" src="../../libs/app-common/mixer-longpress.js"></script>
</body>
</html>
